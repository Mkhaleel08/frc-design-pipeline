<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRC Design Pipeline</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0D0D0D;
      color: #FFFFFF;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1A1A1A; }
    ::-webkit-scrollbar-thumb { background: #333333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #444444; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const STAGES = ['Submitted', 'Assigned', 'In Progress', 'Review', 'Fabrication', 'Complete'];
    const STAGE_COLORS = {
      'Submitted': '#6366F1',
      'Assigned': '#8B5CF6',
      'In Progress': '#F59E0B',
      'Review': '#3B82F6',
      'Fabrication': '#10B981',
      'Complete': '#22C55E'
    };
    const PRIORITY_COLORS = {
      'High': '#EF4444',
      'Medium': '#F59E0B',
      'Low': '#22C55E'
    };
    const TEAM_MEMBERS = [
      'Alex Chen',
      'Jordan Williams',
      'Sam Rodriguez',
      'Taylor Kim',
      'Casey Johnson',
      'Morgan Lee',
      'Riley Thompson'
    ];
    const ROLES = ['Designer', 'Fabrication', 'Lead'];

    const generateId = () => Math.random().toString(36).substr(2, 9) + Date.now().toString(36);

    const loadFromStorage = () => {
      try {
        const data = localStorage.getItem('frc-design-pipeline');
        return data ? JSON.parse(data) : [];
      } catch { return []; }
    };

    const saveToStorage = (requests) => {
      localStorage.setItem('frc-design-pipeline', JSON.stringify(requests));
    };

    const formatDate = (iso) => {
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    };

    const formatTime = (iso) => {
      const d = new Date(iso);
      return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    };

    const formatDateTime = (iso) => `${formatDate(iso)} at ${formatTime(iso)}`;

    function App() {
      const [requests, setRequests] = useState(loadFromStorage);
      const [view, setView] = useState('board');
      const [selectedRequest, setSelectedRequest] = useState(null);
      const [showForm, setShowForm] = useState(false);
      const [formData, setFormData] = useState({
        title: '',
        description: '',
        priority: 'Medium',
        assignee: TEAM_MEMBERS[0],
        role: 'Designer',
        attachments: '',
        notes: ''
      });

      useEffect(() => { saveToStorage(requests); }, [requests]);

      const getStageIndex = (stage) => STAGES.indexOf(stage);

      const createRequest = () => {
        const now = new Date().toISOString();
        const newRequest = {
          id: generateId(),
          ...formData,
          stage: 'Submitted',
          createdAt: now,
          updatedAt: now,
          activity: [{
            id: generateId(),
            type: 'created',
            message: 'Request created',
            timestamp: now
          }]
        };
        setRequests(prev => [...prev, newRequest]);
        setShowForm(false);
        setFormData({
          title: '',
          description: '',
          priority: 'Medium',
          assignee: TEAM_MEMBERS[0],
          role: 'Designer',
          attachments: '',
          notes: ''
        });
      };

      const updateRequest = (id, updates) => {
        setRequests(prev => prev.map(r => r.id === id ? { ...r, ...updates, updatedAt: new Date().toISOString() } : r));
      };

      const deleteRequest = (id) => {
        setRequests(prev => prev.filter(r => r.id !== id));
        setSelectedRequest(null);
      };

      const advanceStage = (id) => {
        const req = requests.find(r => r.id === id);
        if (!req || req.stage === 'Complete') return;
        const currentIdx = getStageIndex(req.stage);
        const nextStage = STAGES[currentIdx + 1];
        const now = new Date().toISOString();
        const activityEntry = {
          id: generateId(),
          type: 'stage_change',
          message: `Moved to ${nextStage}`,
          timestamp: now
        };
        updateRequest(id, {
          stage: nextStage,
          activity: [...req.activity, activityEntry]
        });
        setSelectedRequest(prev => prev ? { ...prev, stage: nextStage, activity: [...prev.activity, activityEntry] } : null);
      };

      const addNote = (id, note) => {
        if (!note.trim()) return;
        const req = requests.find(r => r.id === id);
        const now = new Date().toISOString();
        const activityEntry = {
          id: generateId(),
          type: 'note_added',
          message: note.trim(),
          timestamp: now
        };
        updateRequest(id, {
          activity: [...req.activity, activityEntry]
        });
        setSelectedRequest(prev => prev ? { ...prev, activity: [...prev.activity, activityEntry] } : null);
      };

      const getStats = () => {
        const stats = {};
        STAGES.forEach(stage => { stats[stage] = 0; });
        requests.forEach(r => { stats[r.stage]++; });
        return stats;
      };

      const getAllActivity = () => {
        const all = [];
        requests.forEach(r => {
          r.activity.forEach(a => {
            all.push({ ...a, requestId: r.id, requestTitle: r.title });
          });
        });
        return all.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      };

      const getInitials = (name) => name.split(' ').map(n => n[0]).join('').toUpperCase();

      return (
        <div className="min-h-screen flex flex-col">
          <Header view={view} setView={setView} onNewRequest={() => setShowForm(true)} />
          <StatsBar stats={getStats()} />

          {view === 'board' ? (
            <KanbanBoard
              requests={requests}
              onCardClick={setSelectedRequest}
              getInitials={getInitials}
            />
          ) : (
            <ActivityLog activity={getAllActivity()} />
          )}

          {selectedRequest && (
            <DetailModal
              request={selectedRequest}
              onClose={() => setSelectedRequest(null)}
              onAdvance={advanceStage}
              onAddNote={addNote}
              onDelete={deleteRequest}
              getStageIndex={getStageIndex}
              getInitials={getInitials}
            />
          )}

          {showForm && (
            <FormModal
              formData={formData}
              setFormData={setFormData}
              onSubmit={createRequest}
              onClose={() => setShowForm(false)}
            />
          )}
        </div>
      );
    }

    function Header({ view, setView, onNewRequest }) {
      return (
        <header className="sticky top-0 z-50 bg-[#0D0D0D]/95 backdrop-blur-sm border-b border-[#333] h-16 flex items-center justify-between px-6">
          <div className="flex items-center gap-3">
            <svg className="w-6 h-6 text-[#22C55E]" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
              <path d="M12 8l3 4h-6l3-4z"/>
            </svg>
            <h1 className="text-xl font-semibold tracking-tight">FRC Design Pipeline</h1>
          </div>

          <div className="flex items-center gap-4">
            <div className="flex bg-[#1A1A1A] rounded-lg p-1">
              <button
                onClick={() => setView('board')}
                className={`px-4 py-1.5 rounded-md text-sm font-medium transition-all ${
                  view === 'board'
                    ? 'bg-[#242424] text-white'
                    : 'text-[#666] hover:text-white'
                }`}
              >
                Board
              </button>
              <button
                onClick={() => setView('activity')}
                className={`px-4 py-1.5 rounded-md text-sm font-medium transition-all ${
                  view === 'activity'
                    ? 'bg-[#242424] text-white'
                    : 'text-[#666] hover:text-white'
                }`}
              >
                Activity Log
              </button>
            </div>

            <button
              onClick={onNewRequest}
              className="flex items-center gap-2 px-4 py-2 bg-[#22C55E] hover:bg-[#16A34A] text-white text-sm font-medium rounded-lg transition-colors"
            >
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
              </svg>
              New Request
            </button>
          </div>
        </header>
      );
    }

    function StatsBar({ stats }) {
      return (
        <div className="bg-[#0D0D0D] border-b border-[#333] h-12 flex items-center px-6 gap-3 overflow-x-auto">
          {STAGES.map(stage => (
            <div
              key={stage}
              className="flex items-center gap-2 px-3 py-1 rounded-full text-xs whitespace-nowrap"
              style={{ backgroundColor: `${STAGE_COLORS[stage]}20` }}
            >
              <span className="w-2 h-2 rounded-full" style={{ backgroundColor: STAGE_COLORS[stage] }}></span>
              <span className="text-[#A0A0A0]">{stage}</span>
              <span className="font-semibold text-white">{stats[stage]}</span>
            </div>
          ))}
        </div>
      );
    }

    function KanbanBoard({ requests, onCardClick, getInitials }) {
      return (
        <div className="flex-1 flex gap-4 p-6 overflow-x-auto">
          {STAGES.map(stage => {
            const stageRequests = requests.filter(r => r.stage === stage);
            return (
              <div key={stage} className="flex-shrink-0 w-72 flex flex-col">
                <div
                  className="flex items-center gap-2 px-3 py-2 rounded-t-lg"
                  style={{ backgroundColor: `${STAGE_COLORS[stage]}20` }}
                >
                  <span className="w-2 h-2 rounded-full" style={{ backgroundColor: STAGE_COLORS[stage] }}></span>
                  <h3 className="text-xs font-semibold uppercase tracking-wider text-[#A0A0A0]">{stage}</h3>
                  <span className="ml-auto text-xs text-[#666]">{stageRequests.length}</span>
                </div>
                <div className="flex-1 bg-[#1A1A1A] rounded-b-lg p-2 flex flex-col gap-2 min-h-[200px]">
                  {stageRequests.length === 0 ? (
                    <div className="flex items-center justify-center h-20 text-xs text-[#666]">
                      No requests
                    </div>
                  ) : (
                    stageRequests.map(req => (
                      <KanbanCard
                        key={req.id}
                        request={req}
                        onClick={() => onCardClick(req)}
                        getInitials={getInitials}
                      />
                    ))
                  )}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function KanbanCard({ request, onClick, getInitials }) {
      return (
        <div
          onClick={onClick}
          className="bg-[#242424] hover:bg-[#2A2A2A] rounded-lg p-3 cursor-pointer transition-colors border-l-4"
          style={{ borderLeftColor: STAGE_COLORS[request.stage] }}
        >
          <h4 className="text-sm font-medium text-white truncate mb-2">{request.title}</h4>
          <div className="flex items-center justify-between">
            <span
              className="text-[10px] px-2 py-0.5 rounded-full font-medium"
              style={{ backgroundColor: `${PRIORITY_COLORS[request.priority]}20`, color: PRIORITY_COLORS[request.priority] }}
            >
              {request.priority}
            </span>
            <div
              className="w-6 h-6 rounded-full bg-[#333] flex items-center justify-center text-[10px] font-medium text-[#A0A0A0]"
              title={request.assignee}
            >
              {getInitials(request.assignee)}
            </div>
          </div>
          {request.activity.length > 1 && (
            <div className="mt-2 flex items-center gap-1 text-[10px] text-[#666]">
              <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                <path fillRule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9z" clipRule="evenodd" />
              </svg>
              {request.activity.length - 1} note{request.activity.length - 1 !== 1 ? 's' : ''}
            </div>
          )}
        </div>
      );
    }

    function ActivityLog({ activity }) {
      return (
        <div className="flex-1 p-6">
          <h2 className="text-sm font-semibold uppercase tracking-wider text-[#666] mb-4">All Activity</h2>
          <div className="space-y-1">
            {activity.length === 0 ? (
              <div className="text-sm text-[#666]">No activity yet</div>
            ) : (
              activity.map((item, idx) => (
                <div key={item.id} className="flex items-start gap-3 py-2 px-3 bg-[#1A1A1A] rounded-lg">
                  <div className="w-2 h-2 mt-1.5 rounded-full bg-[#333]"></div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <span className="text-xs text-[#666]">{formatDateTime(item.timestamp)}</span>
                      <span className="text-xs text-[#A0A0A0]">•</span>
                      <span className="text-xs text-white truncate">{item.requestTitle}</span>
                    </div>
                    <p className="text-sm text-[#A0A0A0] mt-0.5">
                      {item.type === 'created' && 'Request created'}
                      {item.type === 'stage_change' && item.message}
                      {item.type === 'note_added' && `Note: ${item.message}`}
                    </p>
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    function DetailModal({ request, onClose, onAdvance, onAddNote, onDelete, getStageIndex, getInitials }) {
      const [newNote, setNewNote] = useState('');

      const handleAddNote = () => {
        onAddNote(request.id, newNote);
        setNewNote('');
      };

      const handleDelete = () => {
        if (confirm('Are you sure you want to delete this request?')) {
          onDelete(request.id);
        }
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center">
          <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={onClose}></div>
          <div className="relative bg-[#1A1A1A] rounded-xl w-full max-w-2xl max-h-[80vh] overflow-hidden flex flex-col">
            <div className="flex items-center justify-between p-4 border-b border-[#333]">
              <h2 className="text-lg font-semibold">{request.title}</h2>
              <button onClick={onClose} className="text-[#666] hover:text-white">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>

            <div className="flex-1 overflow-y-auto p-4 space-y-4">
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="text-xs text-[#666] uppercase tracking-wider">Status</label>
                  <div className="flex items-center gap-2 mt-1">
                    <span className="w-2 h-2 rounded-full" style={{ backgroundColor: STAGE_COLORS[request.stage] }}></span>
                    <span className="text-sm">{request.stage}</span>
                  </div>
                </div>
                <div>
                  <label className="text-xs text-[#666] uppercase tracking-wider">Priority</label>
                  <div className="mt-1">
                    <span
                      className="text-xs px-2 py-0.5 rounded-full font-medium"
                      style={{ backgroundColor: `${PRIORITY_COLORS[request.priority]}20`, color: PRIORITY_COLORS[request.priority] }}
                    >
                      {request.priority}
                    </span>
                  </div>
                </div>
                <div>
                  <label className="text-xs text-[#666] uppercase tracking-wider">Assignee</label>
                  <div className="flex items-center gap-2 mt-1">
                    <div className="w-5 h-5 rounded-full bg-[#333] flex items-center justify-center text-[10px]">
                      {getInitials(request.assignee)}
                    </div>
                    <span className="text-sm">{request.assignee}</span>
                  </div>
                </div>
                <div>
                  <label className="text-xs text-[#666] uppercase tracking-wider">Role</label>
                  <p className="text-sm mt-1">{request.role}</p>
                </div>
              </div>

              <div>
                <label className="text-xs text-[#666] uppercase tracking-wider">Description</label>
                <p className="text-sm mt-1 text-[#A0A0A0]">{request.description || 'No description'}</p>
              </div>

              {request.attachments && (
                <div>
                  <label className="text-xs text-[#666] uppercase tracking-wider">Attachments</label>
                  <p className="text-sm mt-1 text-[#3B82F6] whitespace-pre-wrap">{request.attachments}</p>
                </div>
              )}

              <div>
                <label className="text-xs text-[#666] uppercase tracking-wider">Activity Log</label>
                <div className="mt-2 space-y-2 max-h-48 overflow-y-auto">
                  {[...request.activity].reverse().map(entry => (
                    <div key={entry.id} className="flex items-start gap-2 text-xs">
                      <span className="text-[#666] whitespace-nowrap">{formatTime(entry.timestamp)}</span>
                      <span className="text-[#A0A0A0]">
                        {entry.type === 'created' && 'Created'}
                        {entry.type === 'stage_change' && entry.message}
                        {entry.type === 'note_added' && `Note: ${entry.message}`}
                      </span>
                    </div>
                  ))}
                </div>
              </div>

              <div>
                <label className="text-xs text-[#666] uppercase tracking-wider">Add Note</label>
                <div className="flex gap-2 mt-1">
                  <input
                    type="text"
                    value={newNote}
                    onChange={(e) => setNewNote(e.target.value)}
                    placeholder="Add a note..."
                    className="flex-1 bg-[#242424] border border-[#333] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#22C55E]"
                    onKeyDown={(e) => e.key === 'Enter' && handleAddNote()}
                  />
                  <button
                    onClick={handleAddNote}
                    className="px-3 py-2 bg-[#22C55E] hover:bg-[#16A34A] text-white text-sm rounded-lg"
                  >
                    Add
                  </button>
                </div>
              </div>
            </div>

            <div className="flex items-center justify-between p-4 border-t border-[#333]">
              <button
                onClick={handleDelete}
                className="text-sm text-[#EF4444] hover:text-white px-3 py-1.5 rounded-lg hover:bg-[#EF4444]/20 transition-colors"
              >
                Delete
              </button>
              {request.stage !== 'Complete' && (
                <button
                  onClick={() => onAdvance(request.id)}
                  className="flex items-center gap-2 px-4 py-2 bg-[#22C55E] hover:bg-[#16A34A] text-white text-sm font-medium rounded-lg"
                >
                  Advance to {STAGES[getStageIndex(request.stage) + 1]}
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                  </svg>
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    function FormModal({ formData, setFormData, onSubmit, onClose }) {
      const handleChange = (field) => (e) => {
        setFormData(prev => ({ ...prev, [field]: e.target.value }));
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!formData.title.trim()) return;
        onSubmit();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center">
          <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={onClose}></div>
          <div className="relative bg-[#1A1A1A] rounded-xl w-full max-w-lg max-h-[80vh] overflow-hidden flex flex-col">
            <div className="flex items-center justify-between p-4 border-b border-[#333]">
              <h2 className="text-lg font-semibold">New Design Request</h2>
              <button onClick={onClose} className="text-[#666] hover:text-white">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>

            <form onSubmit={handleSubmit} className="flex-1 overflow-y-auto p-4 space-y-4">
              <div>
                <label className="text-xs text-[#666] uppercase tracking-wider">Title *</label>
                <input
                  type="text"
                  value={formData.title}
                  onChange={handleChange('title')}
                  required
                  placeholder="Design request title"
                  className="w-full mt-1 bg-[#242424] border border-[#333] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#22C55E]"
                />
              </div>

              <div>
                <label className="text-xs text-[#666] uppercase tracking-wider">Description</label>
                <textarea
                  value={formData.description}
                  onChange={handleChange('description')}
                  placeholder="Describe the design request..."
                  rows={3}
                  className="w-full mt-1 bg-[#242424] border border-[#333] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#22C55E] resize-none"
                />
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="text-xs text-[#666] uppercase tracking-wider">Priority</label>
                  <select
                    value={formData.priority}
                    onChange={handleChange('priority')}
                    className="w-full mt-1 bg-[#242424] border border-[#333] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#22C55E]"
                  >
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                  </select>
                </div>
                <div>
                  <label className="text-xs text-[#666] uppercase tracking-wider">Role</label>
                  <select
                    value={formData.role}
                    onChange={handleChange('role')}
                    className="w-full mt-1 bg-[#242424] border border-[#333] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#22C55E]"
                  >
                    {ROLES.map(role => (
                      <option key={role} value={role}>{role}</option>
                    ))}
                  </select>
                </div>
              </div>

              <div>
                <label className="text-xs text-[#666] uppercase tracking-wider">Assignee</label>
                <select
                  value={formData.assignee}
                  onChange={handleChange('assignee')}
                  className="w-full mt-1 bg-[#242424] border border-[#333] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#22C55E]"
                >
                  {TEAM_MEMBERS.map(member => (
                    <option key={member} value={member}>{member}</option>
                  ))}
                </select>
              </div>

              <div>
                <label className="text-xs text-[#666] uppercase tracking-wider">File/Link Attachments</label>
                <textarea
                  value={formData.attachments}
                  onChange={handleChange('attachments')}
                  placeholder="Paste file URLs or links (one per line)..."
                  rows={3}
                  className="w-full mt-1 bg-[#242424] border border-[#333] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#22C55E] resize-none"
                />
              </div>

              <div>
                <label className="text-xs text-[#666] uppercase tracking-wider">Initial Notes</label>
                <textarea
                  value={formData.notes}
                  onChange={handleChange('notes')}
                  placeholder="Add any initial notes..."
                  rows={2}
                  className="w-full mt-1 bg-[#242424] border border-[#333] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#22C55E] resize-none"
                />
              </div>

              <div className="flex gap-3 pt-2">
                <button
                  type="button"
                  onClick={onClose}
                  className="flex-1 px-4 py-2 border border-[#333] text-[#A0A0A0] rounded-lg hover:text-white hover:border-white transition-colors"
                >
                  Cancel
                </button>
                <button
                  type="submit"
                  className="flex-1 px-4 py-2 bg-[#22C55E] hover:bg-[#16A34A] text-white font-medium rounded-lg"
                >
                  Create Request
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
